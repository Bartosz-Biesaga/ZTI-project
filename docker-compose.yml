services:
  # Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hireme
      POSTGRES_USER: hireme
      POSTGRES_PASSWORD: hireme

  # Spring Boot API
  api:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hireme
      SPRING_DATASOURCE_USERNAME: hireme
      SPRING_DATASOURCE_PASSWORD: hireme
    depends_on:
      - postgres
    restart: on-failure

  # React app (nginx)
  web:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
