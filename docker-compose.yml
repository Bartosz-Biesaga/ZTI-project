services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hireme}
      POSTGRES_USER: ${POSTGRES_USER:-hireme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hireme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hireme} -d ${POSTGRES_DB:-hireme}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hireme}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hireme}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hireme}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
